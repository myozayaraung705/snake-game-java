name: Build and Deploy Java Snake Game

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Compile and package JAR
        run: |
          mkdir -p out/classes out/jar
          javac -d out/classes $(find src/main/java -name "*.java")
          printf "Main-Class: com.snakegame.SnakeGame\n" > out/manifest.txt
          jar cfm out/jar/snake-game.jar out/manifest.txt -C out/classes .

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          cp -r site/* public/
          cp out/jar/snake-game.jar public/snake-game.jar

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
